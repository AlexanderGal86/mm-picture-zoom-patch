name: CI

on: [push, pull_request]

env:
  REGISTRY: dockerhub.xxxxxxx.ru
  IMAGE_NAME: test/mm-picture-zoom
  TAG: 10.11.15-patch1

jobs:
  validate:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Clone Mattermost source
        run: git clone --depth=1 --branch=v10.11.15 https://github.com/mattermost/mattermost.git .mm-source

      - name: Apply patches
        run: bash scripts/apply-patches.sh .mm-source

      - name: Lint
        working-directory: .mm-source/webapp
        run: |
          npm ci
          npm run check:eslint --workspace=channels

      - name: Type check
        working-directory: .mm-source/webapp
        run: npm run check-types --workspace=channels

  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Clone Mattermost source
        run: git clone --depth=1 --branch=v10.11.15 https://github.com/mattermost/mattermost.git .mm-source

      - name: Apply patches
        run: bash scripts/apply-patches.sh .mm-source

      - name: Install dependencies
        working-directory: .mm-source/webapp
        run: npm ci

      - name: Unit tests
        working-directory: .mm-source/webapp
        run: npm run test -w=channels -- src/__tests__/image_preview.test.tsx

  docker-build-and-push:
    if: false
    needs: [validate, test]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        run: bash scripts/build-and-push.sh

  e2e-smoke:
    if: github.ref == 'refs/heads/main'
    needs: [docker-build-and-push]
    runs-on: ubuntu-22.04
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: mmuser
          POSTGRES_PASSWORD: mmuser
          POSTGRES_DB: mattermost
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull built image
        run: docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.TAG }}

      - name: Start Mattermost container
        run: |
          docker run -d --name mm-smoke \
            --network host \
            -e MM_SERVICESETTINGS_SITEURL=http://localhost:8065 \
            -e MM_SQLSETTINGS_DATASOURCE="postgres://mmuser:mmuser@localhost:5432/mattermost?sslmode=disable&connect_timeout=10" \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.TAG }}

      - name: Wait for Mattermost
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8065 > /dev/null 2>&1; then
              echo "Mattermost is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Mattermost did not start in time"
          docker logs mm-smoke
          exit 1

      - name: Check static assets
        run: |
          curl -sf http://localhost:8065/static/root.html | grep -q 'root' && \
          echo "Static assets OK" || \
          (echo "Static assets missing"; exit 1)

      - name: Cleanup
        if: always()
        run: docker rm -f mm-smoke || true
